<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Your Appointment | Crown Ceramic Coating</title>
<meta name="description" content="Book a free consultation or service appointment with Crown Ceramic Coating — ceramic coating, paint correction & detailing across Dallas–Fort Worth.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0a0a0a; --dark:#1a1a1a; --panel:#222121; --white:#fff;
    --gold:#c9a14a; --gold2:#e6c879; --text:#f4f1ea; --muted:#9b958c;
    --line:rgba(201,161,74,0.22); --ok:#3fae6b; --err:#e2574c;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--black);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;}
  a{color:var(--gold);text-decoration:none;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 6vw;border-bottom:1px solid var(--line);}
  .brand{font-family:'Playfair Display',serif;letter-spacing:5px;color:var(--gold);text-transform:uppercase;font-size:15px;}
  .brand small{display:block;font-family:'Inter',sans-serif;letter-spacing:3px;font-size:10px;color:var(--muted);margin-top:3px;}
  .topbar .back{font-size:13px;color:var(--muted);letter-spacing:1px;}
  .wrap{max-width:760px;margin:0 auto;padding:48px 22px 90px;}
  .hero{text-align:center;margin-bottom:38px;}
  .kicker{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
  h1{font-family:'Playfair Display',serif;font-size:clamp(30px,6vw,46px);font-weight:700;line-height:1.12;}
  .hours{margin-top:14px;color:var(--muted);font-size:14px;}
  .card{background:var(--dark);border:1px solid var(--line);border-radius:16px;padding:30px clamp(20px,4vw,38px);box-shadow:0 20px 60px rgba(0,0,0,.4);}
  label{display:block;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:18px 0 8px;font-weight:600;}
  input,select,textarea{width:100%;background:#141414;border:1px solid #2e2c29;border-radius:9px;padding:14px 16px;color:var(--text);font-family:inherit;font-size:15px;transition:border-color .2s;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);}
  textarea{resize:vertical;min-height:80px;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:560px){.row{grid-template-columns:1fr;}}
  .seg{display:flex;gap:10px;margin-top:8px;}
  .seg button{flex:1;background:#141414;border:1px solid #2e2c29;color:var(--text);padding:13px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;letter-spacing:.5px;transition:all .2s;}
  .seg button.active{background:var(--gold);color:#16130c;border-color:var(--gold);}
  .dates{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:8px;max-height:230px;overflow-y:auto;padding:4px;}
  .date-chip{background:#141414;border:1px solid #2e2c29;border-radius:9px;padding:12px 10px;cursor:pointer;text-align:center;font-size:13px;transition:all .15s;}
  .date-chip:hover{border-color:var(--gold);}
  .date-chip.active{background:var(--gold);color:#16130c;border-color:var(--gold);font-weight:700;}
  .date-chip .d{font-weight:700;font-size:15px;}
  .date-chip .m{display:block;color:var(--muted);font-size:11px;margin-top:2px;}
  .date-chip.active .m{color:#3c3220;}
  .loading,.empty{color:var(--muted);font-size:14px;padding:14px 2px;}
  .submit{width:100%;margin-top:26px;background:var(--gold);color:#16130c;border:none;border-radius:10px;padding:16px;font-family:inherit;font-size:15px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:transform .12s,box-shadow .2s;}
  .submit:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(201,161,74,.3);}
  .submit:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none;}
  .msg{margin-top:18px;padding:14px 16px;border-radius:9px;font-size:14px;display:none;}
  .msg.show{display:block;}
  .msg.ok{background:rgba(63,174,107,.12);border:1px solid var(--ok);color:#a9e6c2;}
  .msg.err{background:rgba(226,87,76,.12);border:1px solid var(--err);color:#f3b4ae;}
  .success{display:none;text-align:center;padding:30px 10px;}
  .success.show{display:block;}
  .success .check{width:64px;height:64px;border-radius:50%;background:rgba(63,174,107,.15);border:2px solid var(--ok);color:var(--ok);font-size:32px;line-height:60px;margin:0 auto 18px;}
  .success h2{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:10px;}
  .success p{color:var(--muted);}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">&#9819; Crown<small>Ceramic Coating</small></div>
    <a class="back" href="/">&larr; Back to site</a>
  </div>

  <div class="wrap">
    <div class="hero">
      <div class="kicker">Schedule</div>
      <h1>Book Your Appointment</h1>
      <p class="hours" id="hoursLine">Mon–Sat 6:00 AM–7:00 PM CST · Closed Sunday</p>
    </div>

    <div class="card" id="card">
      <form id="bookForm" novalidate>
        <label>I'd like to book</label>
        <div class="seg" id="typeSeg">
          <button type="button" data-type="consultation" class="active">Free Consultation</button>
          <button type="button" data-type="service">Service Appointment</button>
        </div>

        <div class="row">
          <div><label for="name">Full name</label><input id="name" required autocomplete="name"></div>
          <div><label for="phone">Phone</label><input id="phone" type="tel" autocomplete="tel"></div>
        </div>
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="email">

        <div class="row">
          <div>
            <label for="service">Service of interest</label>
            <select id="service">
              <option value="">Not sure yet — help me decide</option>
              <option>Ceramic Coating</option>
              <option>Paint Correction &amp; Polishing</option>
              <option>Interior &amp; Detailing</option>
              <option>Paint Protection Film (PPF)</option>
              <option>Wheel &amp; Tire Coating</option>
              <option>Maintenance / Coating Check-up</option>
            </select>
          </div>
          <div><label for="vehicle">Vehicle</label><input id="vehicle" placeholder="Year / Make / Model"></div>
        </div>

        <label>Choose a date <span style="color:var(--muted);text-transform:none;letter-spacing:0;font-weight:400;">(open days only)</span></label>
        <div class="dates" id="dates"><div class="loading">Loading available dates…</div></div>

        <label for="notes">Anything we should know? (optional)</label>
        <textarea id="notes" placeholder="Goals, paint condition, timing, questions…"></textarea>

        <button type="submit" class="submit" id="submitBtn">Request Appointment</button>
        <div class="msg" id="msg"></div>
      </form>

      <div class="success" id="success">
        <div class="check">&#10003;</div>
        <h2>You're booked!</h2>
        <p id="successText">We've received your request and emailed a confirmation. We'll see you soon.</p>
      </div>
    </div>
  </div>

<script>
(function(){
  const ORIGIN = window.location.origin;
  let eventType = 'consultation';
  let selectedDate = null;

  // Booking type toggle
  document.getElementById('typeSeg').addEventListener('click', e=>{
    const b = e.target.closest('button[data-type]'); if(!b) return;
    eventType = b.dataset.type;
    [...document.querySelectorAll('#typeSeg button')].forEach(x=>x.classList.toggle('active', x===b));
  });

  // Load available dates
  async function loadDates(){
    const box = document.getElementById('dates');
    try{
      const r = await fetch(ORIGIN + '/api/public/availability?days=60');
      const data = await r.json();
      if(data.hours) document.getElementById('hoursLine').textContent = data.hours;
      const avail = (data && data.available) || [];
      if(!avail.length){ box.innerHTML = '<div class="empty">No open dates right now — please call (940) 217-8680 and we\'ll find a time.</div>'; return; }
      box.innerHTML = '';
      avail.forEach(slot=>{
        const dt = new Date(slot.date + 'T12:00:00');
        const chip = document.createElement('div');
        chip.className = 'date-chip';
        chip.dataset.date = slot.date;
        chip.innerHTML = '<span class="d">'+dt.toLocaleDateString('en-US',{weekday:'short',day:'numeric'})+'</span><span class="m">'+dt.toLocaleDateString('en-US',{month:'short'})+'</span>';
        chip.addEventListener('click', ()=>{
          selectedDate = slot.date;
          [...box.children].forEach(c=>c.classList.toggle('active', c===chip));
        });
        box.appendChild(chip);
      });
    }catch(err){
      box.innerHTML = '<div class="empty">Couldn\'t load dates. Please call (940) 217-8680.</div>';
    }
  }
  loadDates();

  function showMsg(text, ok){
    const m = document.getElementById('msg');
    m.textContent = text; m.className = 'msg show ' + (ok?'ok':'err');
  }

  document.getElementById('bookForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    if(!name || !email){ showMsg('Please enter your name and email.', false); return; }
    if(!selectedDate){ showMsg('Please choose an available date.', false); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Booking…';
    try{
      const r = await fetch(ORIGIN + '/api/public/schedule', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          name, email,
          phone: document.getElementById('phone').value.trim(),
          date: selectedDate,
          eventType,
          service: document.getElementById('service').value,
          vehicle: document.getElementById('vehicle').value.trim(),
          message: document.getElementById('notes').value.trim()
        })
      });
      const data = await r.json();
      if(r.ok && data.success){
        document.getElementById('bookForm').style.display = 'none';
        document.getElementById('successText').textContent =
          'We\'ve booked you for ' + (data.when || 'your selected date') + ' and emailed a confirmation. We\'ll be in touch soon!';
        document.getElementById('success').classList.add('show');
      } else {
        showMsg(data.message || 'Something went wrong. Please try again or call us.', false);
        btn.disabled = false; btn.textContent = orig;
        if(r.status === 409) loadDates(); // date taken — refresh
      }
    }catch(err){
      showMsg('Network error — please try again or call (940) 217-8680.', false);
      btn.disabled = false; btn.textContent = orig;
    }
  });
})();
</script>
</body>
</html>
